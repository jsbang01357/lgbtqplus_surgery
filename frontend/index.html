<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jCloud</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-router-ready="false">
    <header class="global-nav" aria-label="Global">
      <div class="nav-left">
        <div class="system-info">
          <span id="nav-time" class="info-item">00:00:00</span>
          <span id="nav-ip" class="info-item">0.0.0.0</span>
        </div>
      </div>

      <div class="nav-center">
        <div class="global-search">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <circle cx="11" cy="11" r="6.2"></circle>
            <path d="m16 16 4 4"></path>
          </svg>
          <input type="text" id="global-search-input" placeholder="Search jCloud..." aria-label="Search">
        </div>
      </div>

      <div class="nav-right">
        <div class="auth-status">
          <span class="status-indicator" id="nav-status-indicator"></span>
          <span id="nav-status-text">인증 대기</span>
        </div>
        <button class="nav-button nav-button-primary" id="nav-passkey-register" type="button" hidden>패스키 등록</button>
        <button class="nav-button nav-button-secondary" id="nav-login-button" type="button">로그인</button>
        <button class="nav-button nav-button-danger" id="nav-logout-button" type="button" hidden>로그아웃</button>
      </div>
    </header>

    <div class="sub-nav">
      <div class="sub-left">
        <a class="brand-mark" href="/home" data-route="home" aria-label="jCloud home">
          <svg class="cloud-icon" viewBox="0 0 100 100" width="28" height="28" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="nav-cloud-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0071e3" />
                <stop offset="100%" stop-color="#42a5f5" />
              </linearGradient>
            </defs>
            <path fill="url(#nav-cloud-gradient)" d="M72,80H28c-12.15,0-22-9.85-22-22c0-11.82,9.33-21.46,21.05-21.96C29.62,21.13,42.45,10,58,10
            c15.93,0,29.07,11.51,31.62,26.79C95.53,38.31,100,43.76,100,50C100,66.57,88.57,80,72,80z" />
          </svg>
          <span class="sub-title">jCloud</span>
        </a>
        <nav class="sub-links" aria-label="Workspace">
          <a href="/files" data-route="files">웹하드</a>
          <a href="/memos" data-route="memos">메모장</a>
          <a href="/ai" data-route="ai">Intake</a>
          <a href="/tools" data-route="tools">도구모음</a>
        </nav>
      </div>
