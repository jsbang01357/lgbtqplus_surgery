<section id="home" data-page="home" class="product-tile product-tile-light dashboard-section">
  <div class="dashboard-header">
    <div class="header-left">
      <h1>Dashboard</h1>
      <p>오늘의 작업을 한눈에 확인하고 필요한 서비스로 빠르게 이동하세요.</p>
    </div>
    <div class="header-right">
      <div class="quick-stats">
        <div class="stat-item">
          <span id="file-count">0</span>
          <small>Files</small>
        </div>
        <div class="stat-item">
          <span id="memo-count">0</span>
          <small>Memos</small>
        </div>
      </div>
    </div>
  </div>

  <div class="dashboard-grid">
    <!-- Webhard Card -->
    <a href="/files" data-route="files" class="dashboard-card card-files">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <div class="card-content">
        <h3>웹하드</h3>
        <p>GCS 기반의 안전한 파일 보관소</p>
        <div class="hero-file-list" id="hero-file-list">
          <div class="loading-state">파일을 불러오는 중...</div>
        </div>
      </div>
      <div class="card-footer">
        <span>파일 관리하기</span>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"></path>
        </svg>
      </div>
    </a>

    <!-- Memos Card -->
    <a href="/memos" data-route="memos" class="dashboard-card card-memos">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
      </div>
      <div class="card-content">
        <h3>메모장</h3>
        <p>최근 기록된 아이디어와 메모</p>
        <p class="memo-preview" id="hero-memo-preview">최근 메모를 불러오는 중...</p>
      </div>
      <div class="card-footer">
        <span>메모 작성하기</span>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"></path>
        </svg>
      </div>
    </a>

    <!-- AI Card -->
    <a href="/ai" data-route="ai" class="dashboard-card card-ai">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </div>
      <div class="card-content">
        <h3>AI 분석</h3>
        <p>Gemini를 활용한 스마트 작업 지원</p>
        <div class="ai-status-indicator">
          <span class="pulse-dot"></span>
          <span>지금 바로 질문해보세요</span>
        </div>
      </div>
      <div class="card-footer">
        <span>AI 비서 열기</span>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"></path>
        </svg>
      </div>
    </a>
  </div>

  <div class="dashboard-tools-section">
    <div class="section-head">
      <h2>Quick Tools</h2>
      <p>자주 사용하는 도구를 바로 실행하세요.</p>
    </div>
    <div class="quick-tools-grid">
      <button class="quick-tool-btn" data-tool-shortcut="cleaner">
        <strong>텍스트 클리너</strong>
      </button>
      <button class="quick-tool-btn" data-tool-shortcut="md-pdf">
        <strong>MD to PDF</strong>
      </button>
      <button class="quick-tool-btn" data-tool-shortcut="counter">
        <strong>글자수 카운터</strong>
      </button>
      <button class="quick-tool-btn" data-tool-shortcut="settlement">
        <strong>정산 계산기</strong>
      </button>
    </div>
  </div>
</section>
