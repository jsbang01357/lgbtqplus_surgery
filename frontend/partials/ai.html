<section id="ai" data-page="ai" class="product-tile product-tile-dark-2 app-section" aria-labelledby="ai-title">
  <div class="section-head">
    <h2 id="ai-title">EMR Intake</h2>
    <span style="font-size: 0.8rem; background: #005A9E; color: #fff; padding: 2px 6px; border-radius: 4px; margin-left: 8px;">v6 Pipeline</span>
  </div>
  <div class="ai-workbench">
    <div class="prompt-panel">
      <div style="margin-bottom: 16px;">
        <label for="intake-patient-id" style="display:block; margin-bottom:6px; font-weight:600; color:var(--neutral-90);">Patient ID</label>
        <input type="text" id="intake-patient-id" class="input" value="patient_001" placeholder="e.g. patient_001" required style="width: 100%; max-width: 240px; padding: 8px;">
      </div>
      <div style="margin-bottom: 16px;">
        <label for="ai-prompt" style="display:block; margin-bottom:6px; font-weight:600; color:var(--neutral-90);">Raw EMR Text (Paste Data Here)</label>
        <textarea id="ai-prompt" class="input" rows="12" placeholder="정제할 EMR 텍스트(검사 결과, 노트, 처방 등)를 붙여넣으세요..."></textarea>
      </div>
      <div class="form-actions">
        <button class="button button-primary" id="run-ai" type="button">Run Normalization</button>
      </div>
    </div>
    <article class="ai-result markdown-body" id="ai-result" style="display: none;">
      <!-- Results will be injected here -->
    </article>
    <div class="form-actions ai-result-actions" style="margin-top: 16px;">
      <button class="button button-secondary" id="sync-local" type="button" disabled>Sync to Local Workspace (Phase 3)</button>
    </div>
  </div>
</section>
