<section id="ai" class="product-tile product-tile-dark-2 app-section" aria-labelledby="ai-title">
  <div class="section-head">
    <h2 id="ai-title">AI</h2>
    <p>자주 쓰는 발표, 예상 QnA, 교수님 질문 준비를 빠르게 시작합니다.</p>
  </div>
  <div class="ai-workbench">
    <div class="prompt-panel">
      <div class="preset-row" id="preset-row"></div>
      <div class="ai-source-grid">
        <div>
          <div class="source-heading">
            <strong>파일</strong>
            <small id="ai-file-status">선택 없음</small>
          </div>
          <div class="source-list" id="ai-file-sources"></div>
        </div>
        <div>
          <div class="source-heading">
            <strong>메모</strong>
            <small id="ai-memo-status">선택 없음</small>
          </div>
          <div class="source-list" id="ai-memo-sources"></div>
        </div>
      </div>
      <textarea id="ai-prompt" rows="7">SOAP 1분 발표용으로 핵심만 정리해줘.</textarea>
      <div class="form-actions">
        <button class="button button-primary" id="run-ai" type="button">분석 시작</button>
        <button class="button button-secondary" id="save-ai-memo" type="button" disabled>메모로 저장</button>
      </div>
    </div>
    <article class="ai-result" id="ai-result">
      <span>AI result</span>
      <h3>발표 흐름 초안</h3>
      <p>주호소, 핵심 검사, 판단 근거, 다음 질문 순서로 1분 안에 말할 수 있게 정리됩니다.</p>
    </article>
  </div>
</section>
