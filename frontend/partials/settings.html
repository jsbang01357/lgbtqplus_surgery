<section id="settings" data-page="settings" class="product-tile product-tile-light app-section settings-section" aria-labelledby="settings-title">
  <div class="section-head">
    <h2 id="settings-title">설정</h2>
    <p>로그인, 접속 기록, Gemini 사용량을 운영 화면에서 따로 확인합니다.</p>
  </div>

  <div class="settings-layout">
    <form class="utility-card settings-card" id="account-id-form">
      <div class="card-toolbar">
        <div>
          <h3>계정 ID 로그인</h3>
          <small id="account-id-status">소유자 계정만 허용</small>
        </div>
      </div>
      <input id="account-id-input" type="email" autocomplete="username" placeholder="jsbang01357@gmail.com" />
      <button class="button button-primary" type="submit">계정 ID로 로그인</button>
    </form>

    <article class="utility-card settings-card">
      <div class="card-toolbar">
        <div>
          <h3>인증 상태</h3>
          <small>현재 브라우저 세션</small>
        </div>
        <button class="button button-pearl" id="settings-refresh" type="button">새로고침</button>
      </div>
      <div class="tool-metrics settings-metrics" id="settings-auth-metrics"></div>
    </article>

    <article class="utility-card settings-card settings-card-wide">
      <div class="card-toolbar">
        <div>
          <h3>접속 기록 분석</h3>
          <small id="access-log-status">최근 접속 기록</small>
        </div>
      </div>
      <div class="tool-metrics settings-metrics" id="access-log-metrics"></div>
      <div class="settings-list" id="access-log-list"></div>
    </article>

    <article class="utility-card settings-card settings-card-wide">
      <div class="card-toolbar">
        <div>
          <h3>Gemini 토큰 분석</h3>
          <small id="gemini-usage-status">usage metadata 기준</small>
        </div>
      </div>
      <div class="tool-metrics settings-metrics" id="gemini-usage-metrics"></div>
      <div class="settings-list" id="gemini-usage-list"></div>
    </article>
  </div>
</section>
