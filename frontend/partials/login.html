<section id="login" data-page="login" class="login-section" aria-labelledby="login-title">
  <div class="login-bg-glow"></div>
  <div class="login-container">
    <div class="login-brand">
      <div class="brand-logo-large">
        <span class="brand-glyph" aria-hidden="true"></span>
      </div>
      <h1 id="login-title">Jisong Cloud</h1>
      <p>Your secure personal workspace</p>
    </div>

    <div class="login-card glass-card">
      <div class="login-tabs">
        <button class="login-tab is-active" data-login-tab="passkey">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          패스키
        </button>
        <button class="login-tab" data-login-tab="account">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          계정 ID
        </button>
      </div>

      <div class="login-content">
        <div id="login-panel-passkey" class="login-panel active">
          <div class="login-illustration">
            <div class="pulse-ring"></div>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
          </div>
          <h3>간편한 패스키 로그인</h3>
          <p>지문, 얼굴 인식 또는 기기 암호를 사용하여 안전하게 로그인하세요.</p>
          <button class="button button-primary button-large full-width" id="login-button-passkey">패스키로 계속하기</button>
        </div>

        <div id="login-panel-account" class="login-panel">
          <h3>계정 ID 로그인</h3>
          <p>이메일과 비밀번호를 입력하여 접속하세요.</p>
          <form id="login-form-account" class="login-form">
            <div class="input-group">
              <label for="login-email">이메일</label>
              <input type="email" id="login-email" placeholder="name@example.com" required autocomplete="username">
            </div>
            <div class="input-group">
              <label for="login-password">비밀번호</label>
              <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button class="button button-primary button-large full-width" type="submit" id="login-button-account">로그인</button>
          </form>
        </div>
      </div>
    </div>

    <p class="login-footer">
      Jisong Cloud &middot; Premium Personal Cloud Service
    </p>
  </div>
</section>
