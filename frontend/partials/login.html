<section id="login" data-page="login" class="product-tile product-tile-parchment login-section" aria-labelledby="login-title">
  <div class="login-container">
    <div class="login-brand">
      <span class="brand-glyph" aria-hidden="true"></span>
      <h1>Jisong Cloud</h1>
      <p>작업 공간에 접근하려면 인증이 필요합니다.</p>
    </div>

    <div class="login-box utility-card">
      <div class="login-tabs">
        <button class="login-tab is-active" data-login-tab="passkey">패스키</button>
        <button class="login-tab" data-login-tab="account">계정 ID</button>
      </div>

      <div id="login-panel-passkey" class="login-panel">
        <div class="login-illustration">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <p>생체 인식 또는 기기 암호로 안전하고 빠르게 로그인하세요.</p>
        <button class="button button-primary button-large" id="login-button-passkey">패스키로 로그인</button>
      </div>

      <div id="login-panel-account" class="login-panel" style="display: none;">
        <form id="login-form-account">
          <div class="tool-input-group">
            <label for="login-email">이메일</label>
            <input type="email" id="login-email" placeholder="example@gmail.com" required>
          </div>
          <div class="tool-input-group">
            <label for="login-password">비밀번호</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
          </div>
          <button class="button button-primary button-large" type="submit" id="login-button-account">로그인</button>
        </form>
      </div>
    </div>

    <p class="login-footer">Jisong Cloud · GCS & Gemini 기반 개인용 클라우드</p>
  </div>
</section>
