<section id="login" data-page="login" class="login-section" aria-labelledby="login-title">
  <div class="login-bg-glow"></div>
  <div class="login-container">
    <div class="login-brand">
      <div class="brand-logo-large">
        <svg class="cloud-icon" viewBox="0 0 100 100" width="64" height="64" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="cloud-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#0071e3" />
              <stop offset="100%" stop-color="#42a5f5" />
            </linearGradient>
            <filter id="cloud-glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="8" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
          </defs>
          <path fill="url(#cloud-gradient)" filter="url(#cloud-glow)" d="M72,80H28c-12.15,0-22-9.85-22-22c0-11.82,9.33-21.46,21.05-21.96C29.62,21.13,42.45,10,58,10
          c15.93,0,29.07,11.51,31.62,26.79C95.53,38.31,100,43.76,100,50C100,66.57,88.57,80,72,80z" />
        </svg>
      </div>
      <h1 id="login-title">Qplus surgery</h1>
    </div>

    <div class="login-card glass-card">
      <div class="login-tabs">
        <button class="login-tab is-active" data-login-tab="login">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          로그인
        </button>
        <button class="login-tab" data-login-tab="register">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line>
            <line x1="23" y1="11" x2="17" y2="11"></line>
          </svg>
          회원가입
        </button>
      </div>

      <div class="login-content">
        <!-- Login Panel -->
        <div id="login-panel-login" class="login-panel active">
          <h3>계정 로그인</h3>
          <p>등록된 이메일과 비밀번호를 입력하여 로그인하세요.</p>
          <form id="login-form-account" class="login-form">
            <div class="input-group">
              <label for="login-email">이메일 *</label>
              <input type="email" id="login-email" placeholder="name@example.com" required autocomplete="username">
            </div>
            <div class="input-group">
              <label for="login-password">비밀번호 *</label>
              <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button class="button button-primary button-large full-width" type="submit" id="login-button-account">로그인</button>
          </form>
        </div>

        <!-- Register Panel -->
        <div id="login-panel-register" class="login-panel">
          <h3>신규 회원가입</h3>
          <p>사용하실 이메일과 비밀번호를 입력해 회원가입하세요.</p>
          <form id="register-form-account" class="login-form">
            <div class="input-group">
              <label for="register-email">이메일 *</label>
              <input type="email" id="register-email" placeholder="name@example.com" required autocomplete="username">
            </div>
            <div class="input-group">
              <label for="register-password">비밀번호 *</label>
              <input type="password" id="register-password" placeholder="••••••••" required autocomplete="new-password">
            </div>
            <div class="input-group">
              <label for="register-confirm-password">비밀번호 확인 *</label>
              <input type="password" id="register-confirm-password" placeholder="••••••••" required autocomplete="new-password">
            </div>
            <button class="button button-primary button-large full-width" type="submit" id="register-button-account">회원가입</button>
          </form>
        </div>
      </div>
    </div>

    <p class="login-footer">
      Qplus surgery · V 1.0
    </p>
  </div>
</section>
