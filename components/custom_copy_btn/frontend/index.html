<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>copy-to-clipboard</title>
    <script src="./streamlit-component-lib.js"></script>
    <style>
      body { margin: 0; padding: 0; }
      .copy-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        font-weight: 600;
        padding: 0.35rem 0.75rem;
        border-radius: 0.75rem;
        min-height: 2.9rem;
        margin: 0;
        line-height: 1.4;
        color: #18212b;
        width: 100%;
        user-select: none;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(15, 23, 42, 0.12);
        cursor: pointer;
        font-size: 14px;
        font-family: "Source Sans Pro", sans-serif;
        box-sizing: border-box;
        box-shadow: none;
        transition: border-color 0.18s ease, color 0.18s ease, background-color 0.18s ease, transform 0.18s ease;
      }
      .copy-btn:hover {
        border-color: rgba(39, 76, 154, 0.28);
        background: rgba(245, 248, 255, 0.96);
        color: #1a2f63;
      }
      .copy-btn:active {
        transform: translateY(1px);
        border-color: rgba(39, 76, 154, 0.34);
        background: rgba(233, 239, 252, 0.92);
        color: #1a2f63;
      }
      @media (prefers-color-scheme: dark) {
        .copy-btn {
          background: rgba(255, 255, 255, 0.92);
          color: #18212b;
          border-color: rgba(15, 23, 42, 0.12);
        }
        .copy-btn:hover {
          border-color: rgba(39, 76, 154, 0.28);
          color: #1a2f63;
        }
      }
    </style>
  </head>
  <body>
    <button id="copy-button" class="copy-btn">📋</button>
    <script>
      function onRender(event) {
        if (!window.rendered) {
          const { text, before_copy_label, after_copy_label } = event.detail.args;
          const button = document.getElementById('copy-button');
          button.textContent = before_copy_label;

          button.addEventListener('click', function() {
            navigator.clipboard.writeText(text);
            button.textContent = after_copy_label;
            setTimeout(() => {
              button.textContent = before_copy_label;
            }, 1000);
          });

          window.rendered = true;
        }
      }

      Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
      Streamlit.setComponentReady();
      
      // 문서 높이에 맞게 프레임 높이 자동 조절
      const setHeight = () => {
        Streamlit.setFrameHeight(document.documentElement.scrollHeight);
      }
      window.addEventListener('resize', setHeight);
      setHeight();
    </script>
  </body>
</html>
