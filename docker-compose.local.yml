services:
  jisong-cloud:
    build:
      context: .
    container_name: jisong-cloud-local
    restart: unless-stopped
    ports:
      - "127.0.0.1:${JISONG_CLOUD_PORT:-8501}:8501"
    command:
      - streamlit
      - run
      - jisong_cloud.py
      - --server.address
      - 0.0.0.0
      - --server.port
      - "8501"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local_mirror}
      LOCAL_STORAGE_ROOT: /data/jisong-cloud
      LOCAL_STORAGE_SYNC_TO_GCS: ${LOCAL_STORAGE_SYNC_TO_GCS:-true}
      LOCAL_STORAGE_PULL_FROM_GCS: ${LOCAL_STORAGE_PULL_FROM_GCS:-true}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      AI_FALLBACK_PROVIDER: ${AI_FALLBACK_PROVIDER:-gemini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      OLLAMA_MODEL_OPTIONS: ${OLLAMA_MODEL_OPTIONS:-gemma4:e4b,qwen3.5:9b}
      OLLAMA_CF_ACCESS_CLIENT_ID: ${OLLAMA_CF_ACCESS_CLIENT_ID:-}
      OLLAMA_CF_ACCESS_CLIENT_SECRET: ${OLLAMA_CF_ACCESS_CLIENT_SECRET:-}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp_service_account.json
    secrets:
      - source: gcp_service_account
        target: gcp_service_account.json
    volumes:
      - ${LOCAL_STORAGE_HOST_PATH:-/Users/jsbang/jisong-data/storage}:/data/jisong-cloud
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: jisong-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    restart: unless-stopped
    network_mode: "service:jisong-cloud"
    depends_on:
      - jisong-cloud

secrets:
  gcp_service_account:
    file: ${GCP_SERVICE_ACCOUNT_FILE}
